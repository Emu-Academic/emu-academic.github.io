# ============================================================================
#  便捷调整文件 —— Banner 顶部导航 (Nav) 链接
# ----------------------------------------------------------------------------
#  想增删顶部导航的链接？就在这里改。每条链接的字段：
#    name     显示文字 (必填)
#    url      外部链接地址   —— 与 pageRef 二选一
#    pageRef  站内页面标识   —— 与 url 二选一 (例如 "posts")
#    parent   父菜单名，用于做下拉子菜单 (留空则是一级菜单)
#    pre      图标名 (如 "github")，可选
#    weight   排序权重，数字越小越靠前
#
#  改完 push 到 main 即可，GitHub Actions 会自动构建部署。
# ============================================================================

# -- 主导航 (顶部 Banner) --
[[main]]
  name = "Blog"
  pageRef = "posts"
  weight = 10

[[main]]
  pre = "github"
  name = "GitHub"
  url = "https://github.com/emu-academic/"
  weight = 400


