# ============================================================================
#  便捷调整文件 —— 首页"业务"卡片
# ----------------------------------------------------------------------------
#  每张卡片就是一个 [[item]] 块，增删只动这里。字段：
#    name        卡片标题 (必填)
#    url         点击跳转地址 (必填)
#                · 外链写完整 http(s)://...，自动新窗口打开
#                · 站内写相对路径，如 "/posts/"
#    image       卡片配图，两种写法：
#                · 本地图：放 assets/business/ 下，写 "business/xxx.png"
#                  (走 Hugo 资源管线，生成响应式 srcset，自动压缩)
#                · 外链图：写完整 http(s)://... URL，直接引用，不依赖构建时下载
#                留空则显示粉色渐变占位 (不发起网络请求，更省流量)
#    description 一句话描述 (可选)
#
#  改完 push 到 main 即自动构建部署。
#  想加新图：把图片丢进 assets/business/ 目录，再 image = "business/你的图.png"
# ============================================================================
